<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Development</title>
  <style>
    :root {
      --bg: #f4f4f4;
      --card: #ffffff;
      --primary: #0055a5;
      --text: #333;
      --muted: #666;
      --border: #d9d9d9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--border);
    }

    h1 {
      color: var(--primary);
      margin-top: 0;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
    }

    a:hover {
      background: #003f7f;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Under Development</h1>
    <p>
      This app is not ready yet. Please check back later.
    </p>
    <a href="index.html">Back to Apps</a>
  </div>
</body>
</html>
